    <style>
        :root {
            --bg-primary: #0a0a0a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1a1;
            --accent: #c9a962;
            --gold-light: #e8d5a3;
            --gold-dark: #8b6914;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #35302a;
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .galeria-header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 1rem;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.05em;
        }
        
        .btn {
            padding: 0.7rem 1.5rem;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
            min-width: 120px;
            justify-content: center;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        @media (max-width: 480px) {
            .galeria-header {
                gap: 0.5rem;
                padding: 0.8rem 1rem;
            }
            .btn {
                padding: 0.6rem 1rem;
                font-size: 0.6rem;
                min-width: 90px;
            }
            .logo {
                font-size: 1.1rem;
            }
        }
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200, 164, 110, 0.35);
        }

        /* Golden Rustic Frame - BORNE */
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            /* Golden rustic border frame */
            padding: 8px;
            background: linear-gradient(135deg, var(--gold-dark), var(--accent), var(--gold-light), var(--accent), var(--gold-dark));
            background-size: 400% 400%;
            animation: shimmer 4s ease infinite;
            box-shadow: 
                0 4px 15px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            inset: 4px;
            background: var(--bg-primary);
            z-index: 0;
            border-radius: 2px;
        }

        .gallery-item img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            border-radius: 1px;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Vintage corner ornaments */
        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(201, 169, 98, 0.3);
            z-index: 2;
            pointer-events: none;
            border-radius: 2px;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem 1rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .tab {
            padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .tab.active, .tab:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Gallery Grid */
        .galeria-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .category-section {
            display: none;
        }

        .category-section.active {
            display: block;
        }

        .category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .galeria-header {
                padding: 1rem;
            }

            .category-tabs {
                padding: 1rem;
                gap: 0.4rem;
            }

            .tab {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .category-title {
                font-size: 1.5rem;
            }

            /* Adjust frame for mobile */
            .gallery-item {
                padding: 5px;
            }
            .gallery-item::before {
                inset: 3px;
            }
            .gallery-item::after {
                inset: 5px;
            }
        }

        /* ========== LIGHTBOX & CAROUSEL ========== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(53, 48, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .lightbox > * {
            position: relative;
            z-index: 10000;
        }

        body.lightbox-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-image-container {
            position: relative;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px rgba(201, 169, 98, 0.3);
            border-radius: 4px;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(201, 169, 98, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .lightbox-nav:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 2rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .lightbox-close:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .lightbox-counter {
            color: var(--accent);
            font-size: 0.9rem;
            margin-top: 1rem;
            font-family: 'Outfit', sans-serif;
        }

        .lightbox-category {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
    </style>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-category" id="lightbox-category"></span>
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <div class="lightbox-image-container">
            <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#10094;</button>
            <img class="lightbox-image" id="lightbox-image" src="" alt="">
            <button class="lightbox-nav lightbox-next" id="lightbox-next">&#10095;</button>
        </div>
        <div class="lightbox-counter">
            <span id="lightbox-current">1</span> / <span id="lightbox-total">1</span>
        </div>
    </div>

    <script>
        // ========== TAB SWITCHING ==========
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.category-section');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const category = tab.dataset.category;

                // Update tabs
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update sections
                sections.forEach(section => {
                    if (category === 'todas' || section.dataset.category === category) {
                        section.classList.add('active');
                    } else {
                        section.classList.remove('active');
                    }
                });

                // Scroll to top of gallery
                document.querySelector('.galeria-container').scrollIntoView({ behavior: 'smooth' });
            });
        });

        // ========== LIGHTBOX & CAROUSEL ==========
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxCategory = document.getElementById('lightbox-category');
        const lightboxCurrent = document.getElementById('lightbox-current');
        const lightboxTotal = document.getElementById('lightbox-total');
        const lightboxClose = document.getElementById('lightbox-close');
        const lightboxPrev = document.getElementById('lightbox-prev');
        const lightboxNext = document.getElementById('lightbox-next');

        let currentImages = [];
        let currentIndex = 0;
        let currentCategoryName = '';

        // Category display names
        const categoryNames = {
            'bodas': 'Bodas',
            'quince': 'Quinceañeras',
            'newborn': 'Newborn',
            'maternidad': 'Maternidad',
            'familia': 'Familia',
            'individuales': 'Retratos',
            'kids': 'Kids',
            'todas': 'Todas'
        };

        // Open lightbox
        document.querySelectorAll('.gallery-item').forEach((item, index) => {
            item.addEventListener('click', () => {
                // Find parent section and get all images from it
                const activeSection = document.querySelector('.category-section.active');
                const allItems = activeSection.querySelectorAll('.gallery-item img');
                
                currentImages = Array.from(allItems).map(img => img.src);
                currentIndex = index;
                currentCategoryName = categoryNames[activeSection.dataset.category] || 'Galería';
                
                showLightboxImage();
                lightbox.classList.add('active');
                document.body.classList.add('lightbox-open');
            });
        });

        function showLightboxImage() {
            lightboxImage.src = currentImages[currentIndex];
            lightboxCategory.textContent = currentCategoryName;
            lightboxCurrent.textContent = currentIndex + 1;
            lightboxTotal.textContent = currentImages.length;
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % currentImages.length;
            showLightboxImage();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
            showLightboxImage();
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.classList.remove('lightbox-open');
        }

        // Event listeners
        lightboxClose.addEventListener('click', closeLightbox);
        lightboxNext.addEventListener('click', nextImage);
        lightboxPrev.addEventListener('click', prevImage);

        // Close on background click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeLightbox();
        });

        // Touch swipe support
        let touchStartX = 0;
        let touchEndX = 0;

        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        lightbox.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextImage(); // Swipe left = next
                } else {
                    prevImage(); // Swipe right = prev
                }
            }
        }
    </script>
