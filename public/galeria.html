    <style>
        :root {
            --bg-primary: #0a0a0a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1a1;
            --accent: #c9a962;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .galeria-header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 1rem;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.05em;
        }
        
        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, #9a6a8c 0%, #d4b577 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200, 164, 110, 0.35);
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem 1rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .tab {
            padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .tab.active, .tab:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Gallery Grid */
        .galeria-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .category-section {
            display: none;
        }

        .category-section.active {
            display: block;
        }

        .category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .galeria-header {
                padding: 1rem;
            }

            .category-tabs {
                padding: 1rem;
                gap: 0.4rem;
            }

            .tab {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .category-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.category-section');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const category = tab.dataset.category;

                // Update tabs
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update sections
                sections.forEach(section => {
                    if (category === 'todas' || section.dataset.category === category) {
                        section.classList.add('active');
                    } else {
                        section.classList.remove('active');
                    }
                });

                // Scroll to top of gallery
                document.querySelector('.galeria-container').scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
